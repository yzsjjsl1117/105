<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄山毛峰 - 瀹岭</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #FDF8F0;
    color: #1F2D24;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .font-serif-cn { font-family: 'Noto Serif SC', serif; }
  .font-serif-en { font-family: 'Playfair Display', serif; }

  /* Navbar */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(253, 248, 240, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(26, 58, 42, 0.08);
    padding: 12px 0;
  }
  .navbar-inner {
    max-width: 1100px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .navbar-logo {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: #1a3a2a;
  }
  .navbar-logo img { width: 32px; height: 32px; }
  .navbar-logo span { font-size: 20px; font-weight: 700; font-family: 'Noto Serif SC', serif; }
  .navbar-actions { display: flex; align-items: center; gap: 16px; }
  .navbar-cart {
    position: relative; display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 6px; text-decoration: none; color: #1a3a2a;
    font-size: 14px; transition: background 0.2s;
  }
  .navbar-cart:hover { background: rgba(26,58,42,0.06); }
  .cart-badge {
    position: absolute; top: -2px; right: 2px;
    background: #C4953A; color: #fff; font-size: 10px; font-weight: 700;
    min-width: 16px; height: 16px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }
  .navbar-login {
    font-size: 13px; color: #555; text-decoration: none;
    padding: 4px 12px; border-radius: 4px; transition: background 0.2s;
  }
  .navbar-login:hover { background: rgba(26,58,42,0.06); }

  /* Hero Section */
  .hero-section {
    padding: 96px 24px 48px;
    max-width: 1100px; margin: 0 auto;
  }
  .hero-grid {
    display: flex; gap: 48px; margin-bottom: 80px; flex-wrap: wrap;
  }
  .hero-image-col { flex: 1 1 400px; min-width: 300px; }
  .hero-image-wrap {
    aspect-ratio: 1; border-radius: 12px; overflow: hidden;
    background: linear-gradient(135deg, rgba(139,105,20,0.08) 0%, rgba(26,58,42,0.04) 100%);
    padding: 24px 24px 0 24px;
  }
  .hero-image-wrap img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 8px 8px 0 0;
  }
  .hero-info-col {
    flex: 1 1 300px; display: flex; flex-direction: column;
    justify-content: center; gap: 12px;
  }
  .hero-eng-name {
    font-size: 12px; color: #8B6914; letter-spacing: 3px;
    text-transform: uppercase; font-family: 'Playfair Display', serif;
  }
  .hero-name {
    font-size: 40px; font-weight: 700; color: #1a3a2a;
    font-family: 'Noto Serif SC', serif;
  }
  .hero-subtitle { font-size: 16px; color: #5C3D2E; }
  .hero-divider { width: 40px; height: 1px; background: #C4953A; margin: 8px 0; }
  .hero-price { font-size: 36px; font-weight: 700; color: #1a3a2a; }
  .hero-specs { font-size: 13px; color: #888; }
  .hero-desc { font-size: 14px; color: #555; line-height: 1.8; margin: 8px 0; }
  .hero-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }

  .btn-add-cart {
    display: flex; align-items: center; gap: 12px;
  }
  .qty-control {
    display: flex; align-items: center; border: 1px solid #ccc;
    border-radius: 6px; overflow: hidden;
  }
  .qty-btn {
    width: 36px; height: 36px; border: none; background: #f9f9f9;
    font-size: 18px; color: #555; cursor: pointer; transition: background 0.15s;
  }
  .qty-btn:hover { background: #eee; }
  .qty-num {
    width: 48px; height: 36px; border: none; border-left: 1px solid #ccc;
    border-right: 1px solid #ccc; text-align: center; font-size: 14px; color: #333;
    background: #fff;
  }
  .btn-cart-submit {
    padding: 10px 28px; font-size: 14px; font-weight: 600;
    background: #1a3a2a; color: #fff; border: none;
    border-radius: 6px; cursor: pointer; transition: background 0.2s;
  }
  .btn-cart-submit:hover { background: #2a4a3a; }
  .btn-view-cart {
    display: inline-block; padding: 10px 24px; font-size: 14px; font-weight: 600;
    background: #fff; color: #1a3a2a; border: 1px solid #1a3a2a;
    border-radius: 6px; text-align: center; text-decoration: none; transition: all 0.2s;
  }
  .btn-view-cart:hover { background: #1a3a2a; color: #fff; }

  /* Section title */
  .section-title {
    text-align: center; margin-bottom: 32px;
  }
  .section-title h2 {
    font-size: 28px; font-weight: 700; color: #1a3a2a;
    font-family: 'Noto Serif SC', serif;
  }
  .section-title .divider {
    width: 40px; height: 1px; background: #C4953A; margin: 10px auto 0;
  }

  /* Features */
  .features-section { margin-bottom: 80px; }
  .features-list { display: flex; flex-direction: column; gap: 12px; }
  .feature-card {
    aspect-ratio: 21 / 9; border-radius: 10px; overflow: hidden;
    display: flex; align-items: flex-end; padding: 20px;
    transition: transform 0.3s ease;
  }
  .feature-card:hover { transform: scale(1.01); }
  .feature-card-0 { background: linear-gradient(135deg, #f5efe0, #ede0cc); }
  .feature-card-1 { background: linear-gradient(135deg, #e8f0e4, #d8e4d0); }
  .feature-card-2 { background: linear-gradient(135deg, #f0ebe0, #e8dcc8); }
  .feature-card-3 { background: linear-gradient(135deg, #eef0e8, #dce4d0); }
  .feature-card h3 {
    font-size: 18px; font-weight: 700; color: #1a3a2a; margin-bottom: 4px;
    font-family: 'Noto Serif SC', serif;
  }
  .feature-card p { font-size: 14px; color: #6B7F5E; }

  /* Brewing */
  .brewing-section { margin-bottom: 80px; }
  .brewing-card {
    aspect-ratio: 21 / 9; border-radius: 10px; overflow: hidden;
    background: linear-gradient(135deg, #efe8d8, #e0d5c0, #d5c8a8);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 24px; text-align: center;
  }
  .brewing-card h2 {
    font-size: 28px; font-weight: 700; color: #1a3a2a; margin-bottom: 16px;
    font-family: 'Noto Serif SC', serif;
  }
  .brewing-params {
    display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
    font-size: 14px; color: #555;
  }
  .brewing-params b { color: #1a3a2a; }

  .back-link {
    text-align: center; padding-bottom: 64px;
  }
  .back-link a {
    font-size: 14px; color: #8B6914; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s;
  }
  .back-link a:hover { opacity: 0.7; }

  /* Tab switcher */
  .tab-bar {
    display: flex; justify-content: center; gap: 4px; padding: 80px 24px 0;
    max-width: 1100px; margin: 0 auto;
  }
  .tab-btn {
    padding: 8px 24px; font-size: 14px; border: none; background: transparent;
    color: #888; cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s; font-family: 'Noto Serif SC', serif;
  }
  .tab-btn:hover { color: #555; }
  .tab-btn.active { color: #1a3a2a; border-bottom-color: #C4953A; font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: #1a3a2a; color: #fff; padding: 12px 32px; border-radius: 8px;
    font-size: 14px; z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }

  /* Responsive */
  @media (max-width: 768px) {
    .hero-grid { gap: 32px; }
    .hero-image-col { flex: 1 1 100%; }
    .hero-info-col { flex: 1 1 100%; }
    .hero-name { font-size: 30px; }
    .hero-price { font-size: 28px; }
    .feature-card { aspect-ratio: 16/7; padding: 16px; }
    .brewing-card { aspect-ratio: auto; min-height: 240px; padding: 32px 16px; }
    .brewing-params { gap: 16px; }
    .navbar-inner { padding: 0 16px; }
    .hero-section { padding: 80px 16px 32px; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">
      <img src="public/images/LOGO.png" alt="瀹岭" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <span style="display:none">瀹岭</span>
      <span>瀹岭</span>
    </a>
    <div class="navbar-actions">
      <a href="/cart" class="navbar-cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>购物车</span>
      </a>
      <a href="/auth/login" class="navbar-login">登录</a>
    </div>
  </div>
</nav>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchProduct(0)">黄山毛峰</button>
  <button class="tab-btn" onclick="switchProduct(1)">太平猴魁</button>
  <button class="tab-btn" onclick="switchProduct(2)">祁门红茶</button>
</div>

<div id="product-container"></div>

<div id="toast" class="toast">已添加到购物车</div>

<script>
const products = [
  {
    name: "黄山毛峰", englishName: "Huangshan Maofeng", subtitle: "中国十大名茶之一",
    description: "黄山毛峰产于安徽省黄山一带，是中国十大名茶之一。其外形微卷，状似雀舌，绿中泛黄，银毫显露，且带有金黄色鱼叶（俗称黄金片）。",
    price: 298, specs: "净含量：100g | 产地：安徽黄山 | 保质期：18个月",
    image: "public/images/黄山毛峰.png",
    features: [
      { title: "外形特征", desc: "芽叶肥壮匀齐，白毫显露，形似雀舌" },
      { title: "香气特点", desc: "清香高长，兰花香馥郁持久" },
      { title: "汤色滋味", desc: "汤色清澈明亮，滋味鲜浓醇厚，回甘明显" },
      { title: "产地环境", desc: "海拔800米云雾茶园，生态环境优越" }
    ],
    brewing: { water: "85-90℃山泉水或纯净水", ratio: "1:50（3克茶叶配150ml水）", time: "第一泡30秒，后续每泡增加10-15秒", times: "可冲泡3-5次" },
    storage: "密封、避光、防潮、防异味，建议冷藏保存"
  },
  {
    name: "太平猴魁", englishName: "Taiping Houkui", subtitle: "绿茶之王，两叶抱一芽",
    description: "太平猴魁产于安徽省黄山市黄山区（原太平县）一带，为尖茶之极品。其外形两叶抱芽，扁平挺直，自然舒展，白毫隐伏，有「猴魁两头尖，不散不翘不卷边」的美名。",
    price: 398, specs: "净含量：100g | 产地：安徽黄山 | 保质期：18个月",
    image: "public/images/太平猴魁.png",
    features: [
      { title: "外形特征", desc: "两叶抱一芽，扁平挺直，魁伟重实" },
      { title: "香气特点", desc: "兰香高爽，持久悠长，独特猴韵" },
      { title: "汤色滋味", desc: "汤色嫩绿明亮，滋味醇厚甘甜，回味无穷" },
      { title: "产地环境", desc: "黄山余脉深山峡谷，云雾缭绕，土壤肥沃" }
    ],
    brewing: { water: "80-85℃山泉水或纯净水", ratio: "1:50（3克茶叶配150ml水）", time: "第一泡45秒，后续每泡增加15秒", times: "可冲泡4-6次" },
    storage: "密封、避光、防潮、防异味，建议冷藏保存"
  },
  {
    name: "祁门红茶", englishName: "Keemun Black Tea", subtitle: "世界三大高香红茶之首",
    description: "祁门红茶简称祁红，产于安徽省祁门、东至、贵池、石台、黟县等地。祁红是世界三大高香红茶之首，有「茶中英豪」、「群芳最」的美誉，以其独特的「祁门香」闻名于世。",
    price: 268, specs: "净含量：100g | 产地：安徽祁门 | 保质期：36个月",
    image: "public/images/祁门红茶.png",
    features: [
      { title: "外形特征", desc: "条索紧细秀长，色泽乌润，金毫显露" },
      { title: "香气特点", desc: "香气馥郁持久，似果香又似兰花香，国际称之为「祁门香」" },
      { title: "汤色滋味", desc: "汤色红艳明亮，滋味醇和甘甜，叶底红亮" },
      { title: "产地环境", desc: "黄山支脉，气候温和，雨量充沛，土壤肥沃" }
    ],
    brewing: { water: "95-100℃沸水", ratio: "1:50（3克茶叶配150ml水）", time: "第一泡10-15秒，后续每泡增加5-10秒", times: "可冲泡5-7次" },
    storage: "密封、避光、防潮、防异味，常温保存即可"
  }
];

function renderProduct(idx) {
  const p = products[idx];
  const f = p.features;
  const b = p.brewing;
  const featuresHTML = f.map((ft, i) => `
    <div class="feature-card feature-card-${i}">
      <div>
        <h3>${ft.title}</h3>
        <p>${ft.desc}</p>
      </div>
    </div>
  `).join('');

  document.getElementById('product-container').innerHTML = `
    <div class="hero-section">
      <div class="hero-grid">
        <div class="hero-image-col">
          <div class="hero-image-wrap">
            <img src="${p.image}" alt="${p.name}" onerror="this.src='public/images/产品图.png'">
          </div>
        </div>
        <div class="hero-info-col">
          <p class="hero-eng-name">${p.englishName}</p>
          <h1 class="hero-name">${p.name}</h1>
          <p class="hero-subtitle">${p.subtitle}</p>
          <div class="hero-divider"></div>
          <p class="hero-price">¥${p.price.toFixed(0)}</p>
          <p class="hero-specs">${p.specs}</p>
          <p class="hero-desc">${p.description}</p>
          <div class="hero-actions">
            <div class="btn-add-cart">
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <input type="text" class="qty-num" id="qty-num" value="1" readonly>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>
              <button class="btn-cart-submit" onclick="addToCart('${p.name}')">加入购物车</button>
            </div>
            <a href="/cart" class="btn-view-cart">查看购物车</a>
          </div>
        </div>
      </div>

      <div class="features-section">
        <div class="section-title">
          <h2>产品特性</h2>
          <div class="divider"></div>
        </div>
        <div class="features-list">${featuresHTML}</div>
      </div>

      <div class="brewing-section">
        <div class="brewing-card">
          <h2>冲泡方法</h2>
          <div class="divider" style="width:40px;height:1px;background:#C4953A;margin-bottom:20px;"></div>
          <div class="brewing-params">
            <span>水温：<b>${b.water}</b></span>
            <span>茶水比：<b>${b.ratio}</b></span>
            <span>时间：<b>${b.time}</b></span>
            <span>次数：<b>${b.times}</b></span>
          </div>
        </div>
      </div>

      <div class="back-link">
        <a href="/#products"><span>←</span> 返回茶叶系列</a>
      </div>
    </div>
  `;
}

function switchProduct(idx) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  renderProduct(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function changeQty(delta) {
  const el = document.getElementById('qty-num');
  let v = parseInt(el.value) + delta;
  if (v < 1) v = 1;
  if (v > 99) v = 99;
  el.value = v;
}

function addToCart(name) {
  const toast = document.getElementById('toast');
  toast.textContent = `${name} ×${document.getElementById('qty-num').value} 已加入购物车`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

renderProduct(0);
</script>

</body>
</html>
