<h2>暖色调方向</h2>
<p class="subtitle">三个方向，从左到右：从现有绿色的温和升级 → 到完全不同的茶色系</p>

<div class="cards">
  <div class="card" data-choice="green-warm" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;height:120px;border-radius:8px;overflow:hidden">
        <div style="flex:1;background:#1a3a2a"></div>
        <div style="flex:1;background:#2d5a3d"></div>
        <div style="flex:1;background:#8B6914"></div>
        <div style="flex:1;background:#F5E6C8"></div>
        <div style="flex:1;background:#FDF8F0"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 绿+茶金</h3>
      <p>保留品牌绿，加入茶汤金色和米白底色。和现有绿色体系最兼容，改动最小。</p>
    </div>
  </div>
  <div class="card" data-choice="tea-warm" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;height:120px;border-radius:8px;overflow:hidden">
        <div style="flex:1;background:#5C3D2E"></div>
        <div style="flex:1;background:#8B6914"></div>
        <div style="flex:1;background:#C4953A"></div>
        <div style="flex:1;background:#F0DFC8"></div>
        <div style="flex:1;background:#FAF5ED"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 茶褐+暖金</h3>
      <p>以茶褐色为深色，暖金为强调色，奶油纸色为底。像打开茶罐那一刻的色调。</p>
    </div>
  </div>
  <div class="card" data-choice="mountain" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;height:120px;border-radius:8px;overflow:hidden">
        <div style="flex:1;background:#3D4A3B"></div>
        <div style="flex:1;background:#6B7F5E"></div>
        <div style="flex:1;background:#A89060"></div>
        <div style="flex:1;background:#E8DCC8"></div>
        <div style="flex:1;background:#F7F3EB"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 山色+岩灰</h3>
      <p>以黄山云雾灰绿为主色，岩土暖灰为辅，整体偏素雅、中性。更有水墨画的感觉。</p>
    </div>
  </div>
</div>
