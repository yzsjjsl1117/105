<h2>产品详情页 — 布局方案对比</h2>
<p class="subtitle">"自然茶境"方向：山林意境 · 暖色调 · 质感纹理</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>全幅大图 + 滚动叙事</h3>
      <p>产品大图占满首屏 → 向下滚动依次展开：简介 → 特性 → 冲泡 → 储存。信息像翻茶叶包装一样逐层呈现。适合讲品牌故事。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>左右分栏 + 固定购买区</h3>
      <p>桌面端左图右文（升级当前结构），移动端图在上文在下。右侧信息区可滚动，购买按钮始终可见。适合快速决策。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>单栏沉浸式</h3>
      <p>图片居中大尺寸展示，文字短而精炼，大量留白。像茶叶包装展开后的内页设计。适合高端单品展示。</p>
    </div>
  </div>
</div>
