<h2>个人中心 — /account</h2>
<p class="subtitle">左侧导航 + 右侧内容区。标签左对齐，按钮居中。</p>

<div class="mockup">
  <div class="mockup-header">个人中心首页（个人信息）</div>
  <div class="mockup-body">
    <div style="display:flex;gap:24px;min-height:400px">
      <div style="width:180px;border-right:1px solid #e0e0e0;padding-right:16px;flex-shrink:0">
        <div style="padding:12px 16px;background:#1a3a2a;color:#fff;border-radius:4px;font-size:13px;font-weight:600;margin-bottom:4px">个人信息</div>
        <div style="padding:12px 16px;font-size:13px;color:#555;cursor:pointer">我的订单</div>
        <div style="padding:12px 16px;font-size:13px;color:#555;cursor:pointer">收货地址</div>
        <div style="padding:12px 16px;font-size:13px;color:#555;cursor:pointer">修改密码</div>
      </div>
      <div style="flex:1;padding:0 8px">
        <h3 style="font-size:15px;margin-bottom:20px;font-weight:600">基本信息</h3>
        <div style="display:flex;flex-direction:column;gap:14px;align-items:flex-start">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="width:60px;font-size:13px;color:#666;text-align:left">用户名</span>
            <div class="mock-input" style="width:320px">张三</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="width:60px;font-size:13px;color:#666;text-align:left">邮箱</span>
            <div class="mock-input" style="width:320px">zhangsan@example.com</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="width:60px;font-size:13px;color:#666;text-align:left">手机号</span>
            <div class="mock-input" style="width:320px">138xxxx8888</div>
          </div>
          <div style="margin-top:8px;width:392px;display:flex;justify-content:center">
            <button class="mock-button" style="width:140px;background:#1a3a2a;color:#fff;padding:9px">保存修改</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<hr style="margin:40px 0;border-color:#e0e0e0">

<h2>子页面预览</h2>
<p class="subtitle">通过左侧导航切换的各个子页面。</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">我的订单</div>
    <div class="mockup-body">
      <div style="padding:16px">
        <h3 style="font-size:15px;margin-bottom:16px;font-weight:600">我的订单</h3>
        <div style="display:flex;gap:12px;margin-bottom:16px">
          <span style="font-size:12px;padding:4px 12px;background:#1a3a2a;color:#fff;border-radius:3px">全部</span>
          <span style="font-size:12px;padding:4px 12px;color:#888;cursor:pointer">待付款</span>
          <span style="font-size:12px;padding:4px 12px;color:#888;cursor:pointer">已发货</span>
          <span style="font-size:12px;padding:4px 12px;color:#888;cursor:pointer">已完成</span>
        </div>
        <div class="placeholder" style="text-align:center;padding:60px 0;color:#aaa">暂无订单</div>
      </div>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">收货地址</div>
    <div class="mockup-body">
      <div style="padding:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 style="font-size:15px;font-weight:600">收货地址</h3>
          <button class="mock-button" style="background:#1a3a2a;color:#fff;padding:6px 14px;font-size:12px">新增地址</button>
        </div>
        <div class="placeholder" style="text-align:center;padding:60px 0;color:#aaa">暂无地址</div>
      </div>
    </div>
  </div>
</div>

<hr style="margin:40px 0;border-color:#e0e0e0">

<h2>修改密码</h2>
<div class="mockup">
  <div class="mockup-header">修改密码（个人中心内独立子页）</div>
  <div class="mockup-body">
    <div style="padding:16px">
      <h3 style="font-size:15px;margin-bottom:20px;font-weight:600">修改密码</h3>
      <div style="display:flex;flex-direction:column;gap:14px;align-items:flex-start">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="width:80px;font-size:13px;color:#666;text-align:left">当前密码</span>
          <div class="mock-input" style="width:320px">输入当前密码</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="width:80px;font-size:13px;color:#666;text-align:left">新密码</span>
          <div class="mock-input" style="width:320px">输入新密码</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="width:80px;font-size:13px;color:#666;text-align:left">确认新密码</span>
          <div class="mock-input" style="width:320px">再次输入新密码</div>
        </div>
        <div style="margin-top:8px;width:412px;display:flex;justify-content:center">
          <button class="mock-button" style="width:140px;background:#1a3a2a;color:#fff;padding:9px">修改密码</button>
        </div>
      </div>
    </div>
  </div>
</div>
